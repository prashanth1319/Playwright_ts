name: Playwright Tests (TypeScript)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Type check
        run: npm run typecheck

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          CI: true
        continue-on-error: true
        id: run_tests

      - name: Zip HTML report
        if: always()
        run: |
          if [ -d "playwright-report" ]; then
            zip -r playwright-report.zip playwright-report
          fi

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 14

      - name: Upload JUnit results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: test-results/junit-results.xml
          retention-days: 14

      # Sends the report by email regardless of pass/fail, so the team is
      # always notified. Configure the SMTP_* secrets in repo Settings > Secrets.
      - name: Send email with test report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Playwright Test Report - ${{ job.status }} - ${{ github.repository }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          html_body: |
            <h2>Playwright Test Run: ${{ job.status }}</h2>
            <p><b>Repository:</b> ${{ github.repository }}</p>
            <p><b>Branch:</b> ${{ github.ref_name }}</p>
            <p><b>Commit:</b> ${{ github.sha }}</p>
            <p><b>Triggered by:</b> ${{ github.actor }}</p>
            <p>See attached HTML report and JUnit XML, or view the full run:</p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View GitHub Actions Run</a></p>
          attachments: playwright-report.zip,test-results/junit-results.xml

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1